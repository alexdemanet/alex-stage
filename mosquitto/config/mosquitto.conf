# mosquitto/config/mosquitto.conf  (remplace la config de l'image)

# port clair pour tests
listener 1883
allow_anonymous true

# port TLS
listener 8883
protocol mqtt
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key
require_certificate true
use_identity_as_username true
password_file /mosquitto/config/passwords.txt # fichier de mots de passe pour les clients TLS (ici les mots de passe sont les mêmes que le username, ex: "raspi01:raspi01")
acl_file /mosquitto/config/aclfile.txt # fichier ACL pour restreindre l’accès aux topics (ex: "user raspi01\n topic readwrite ems/raspi01/#")